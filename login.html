<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login & Registration</title>
  <link rel="stylesheet" href="login.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
  <div class="container">
    <h1 class="title">PLAYERS BOOKING 🏏</h1>
    <h2>Register</h2>
    <form id="registerForm">
      <input type="text" id="regUsername" placeholder="Username" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="tel" id="regPhoneNumber" placeholder="Phone Number" required pattern="[0-9]{10}">
      <input type="password" id="regPassword" placeholder="Password" required>
      <input type="date" id="regDob" placeholder="Date of Birth" required>
      <input type="text" id="regLocation" placeholder="Location" required>
      <button type="submit">Register</button>
      <div id="registerError" class="error"></div>
      <div id="registerSuccess" class="success"></div>
    </form>
    <hr>
    <h1 class="title">PLAYERS BOOKING 🏏</h1>
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
      <div id="loginError" class="error"></div>
    </form>
  </div>
  <script src="login.js"></script>
</body>
</html>
