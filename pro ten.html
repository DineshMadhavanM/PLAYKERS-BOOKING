<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sports Store</title>
  <link rel="stylesheet" href="pro cric.css" />
</head>
<body>
  <header>
    <h1>🏏 Sports Store</h1>
    <div id="cart-icon" onclick="toggleCart()">🛍️ Cart (<span id="cart-count">0</span>)</div>
  </header>

  <main id="product-list">
    <div class="product">
      <img src="image/tennis bat.webp" alt="Tennis Bat" />
      <h3>Tennis Bat</h3>
      <p>₹1250</p>
      <button onclick="addToCart('Tennis Bat', 1250)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="image/tennis ball.webp" alt="Tennis ball" />
      <h3>Tennis Ball</h3>
      <p>₹350</p>
      <button onclick="addToCart('Tennis Ball', 350)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="image/tennis shoe.webp" alt="Tennis shoe for Men" />
      <h3>Tennis Shoe for Men</h3>
      <p>₹1800</p>
      <button onclick="addToCart('Tennis shoe for Men', 1800)">Add to Cart</button>
    </div>
    
  </main>

  <div id="cart" class="hidden">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <div class="cart-total">Total: ₹<span id="cart-total">0</span></div>
    <button onclick="checkout()" <a href="billing.html>"</a>>Checkout</button>
  </div>

  <script src="pro cric.js"></script>
</body>
</html>
